# ==============================================
# Docker Compose Production — __APP_NAME__
# FrankenPHP + PostgreSQL + Redis
# Tunnel handled by system cloudflared service
# ==============================================

name: __APP_SLUG__-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.frankenphp
      target: production
    image: __APP_SLUG__:production
    container_name: __APP_SLUG__-app-prod
    restart: unless-stopped
    ports:
      - "80:80"
    env_file:
      - .env.production
    volumes:
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: __APP_SLUG__-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: __APP_SLUG__
      POSTGRES_USER: __APP_SLUG__
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U __APP_SLUG__ -d __APP_SLUG__"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: __APP_SLUG__-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    image: __APP_SLUG__:production
    container_name: __APP_SLUG__-worker-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600

  scheduler:
    image: __APP_SLUG__:production
    container_name: __APP_SLUG__-scheduler-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: php artisan schedule:work --no-interaction

volumes:
  app_storage:
    name: __APP_SLUG___storage
  postgres_data:
    name: __APP_SLUG___postgres
  redis_data:
    name: __APP_SLUG___redis

networks:
  app-network:
    name: __APP_SLUG__-network
