name: __APP_SLUG__-dev

services:
  app:
    build:
      context: .
      target: development
    container_name: __APP_SLUG__-app-dev
    ports:
      - "${DEV_PORT:-8787}:8000"
    volumes:
      - .:/app
    networks:
      - __APP_SLUG__
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      target: development
    container_name: __APP_SLUG__-scheduler-dev
    volumes:
      - .:/app
    networks:
      - __APP_SLUG__
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: php artisan schedule:work --no-interaction
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: __APP_SLUG__-db-dev
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: __APP_SLUG__
      POSTGRES_USER: __APP_SLUG__
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    # Match production: preload pg_stat_statements for query insight.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.max=5000"
    volumes:
      - __APP_SLUG__-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U __APP_SLUG__ -d __APP_SLUG__"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - __APP_SLUG__

volumes:
  __APP_SLUG__-db:

networks:
  __APP_SLUG__:
